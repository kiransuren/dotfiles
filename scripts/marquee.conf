# Marquee configuration
# Edit this file to change the scrolling top bar behavior.

# Mode: "text" (marquee.txt), "news" (live headlines), or "graphic" (ASCII sprite)
# Note: when MARQUEE_MODE=text or news, the NEWS_MODE flag below controls the source.
# When MARQUEE_MODE=graphic, a sprite scrolls across the screen.
MARQUEE_MODE=news

# Speed: characters per second (1 = normal, keep at 1 for smoothest)
SPEED=1

# Padding: number of spaces between messages (text/news modes only)
PADDING=10

# --- News settings (used when MARQUEE_MODE=news or NEWS_MODE=on) ---

# News mode: "on" to show news headlines, "off" to use marquee.txt
NEWS_MODE=on

# Number of headlines to fetch per source
NEWS_COUNT=3

# News sources (space-separated list). Available sources:
#   hackernews  - Hacker News front page
#   bbc-world   - BBC World News
#   bbc-tech    - BBC Technology
#   aljazeera   - Al Jazeera
#   google      - Google News (US)
#   google-tech - Google News Technology
#   npr         - NPR News
#   techcrunch  - TechCrunch
NEWS_SOURCES="bbc-world google techcrunch"

# --- Graphic settings (used when MARQUEE_MODE=graphic) ---

# Sprite file name (without .txt) from ~/.tmux/graphics/
# Available: airplane, truck, rocket, car
GRAPHIC=car # canoe

# Background fill character (fills the row around the sprite)
GRAPHIC_BG="_" #".."
